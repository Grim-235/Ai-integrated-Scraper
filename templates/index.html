<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Extraction Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden; /* fixed */
        }

        .glow-orb, .glow-orb-2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            z-index: 0;
        }

        .glow-orb {
            width: 400px;
            height: 400px;
            background: #3b82f6;
            top: -100px;
            left: -100px;
        }

        .glow-orb-2 {
            width: 300px;
            height: 300px;
            background: #8b5cf6;
            bottom: -50px;
            right: -50px;
        }

        .main-container {
            z-index: 1;
            width: 100%;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 3rem;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-title {
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-wrapper {
            position: relative;
            margin-top: 2.5rem;
            margin-bottom: 2rem;
        }

        .search-input {
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 1.25rem 2rem;
            padding-right: 180px;
            color: #f8fafc;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            width: 100%;
        }

        .search-input:focus {
            outline: none;
            background: rgba(15, 23, 42, 0.8);
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25);
        }

        .search-input::placeholder {
            color: #64748b;
        }

        .btn-action {
            position: absolute;
            right: 8px;
            top: 8px;
            bottom: 8px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 0 2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-action:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 15px 30px -10px rgba(99, 102, 241, 0.7);
            color: white;
        }

        .feature-pill {
            display: inline-flex;
            align-items: center;
            font-size: 0.85rem;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            margin: 0 0.5rem;
        }

        .footer-text {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="glow-orb"></div>
<div class="glow-orb-2"></div>

<div class="container main-container">
    <div class="row justify-content-center text-center">
        <div class="col-lg-8 col-md-10">
            <div class="glass-panel">

                <div class="mb-2">
                    <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill border border-primary border-opacity-25 mb-3">
                        <i class="bi bi-cpu me-1"></i> Engine v2.0 Active
                    </span>
                </div>

                <h1 class="display-4 hero-title mb-3">Intelligent Web Scraper</h1>
                <p class="text-secondary fs-5 mb-0 px-md-5">
                    Deploy neural extraction to parse, structure, and compare DOM data instantly.
                </p>

                <form action="/scrape" method="post" class="search-wrapper" id="scrapeForm">
                    <div class="position-relative">
                        <input type="text" name="url" class="search-input" placeholder="https://example.com/target-data" required autocomplete="off">
                        <button type="submit" class="btn btn-action" id="extractBtn">
                            <span id="btnText">
                                <i class="bi bi-lightning-charge-fill me-1"></i> Extract
                            </span>
                        </button>
                    </div>
                </form>

                <div class="d-flex justify-content-center flex-wrap gap-2 mt-4">
                    <div class="feature-pill">
                        <i class="bi bi-check-circle text-success me-2"></i> Auto-Categorization
                    </div>
                    <div class="feature-pill">
                        <i class="bi bi-diagram-3 text-info me-2"></i> Compare Targets
                    </div>
                    <div class="feature-pill">
                        <i class="bi bi-shield-check text-primary me-2"></i> Proxy Routing
                    </div>
                </div>

                <div class="footer-text">
                    Built with Flask + BeautifulSoup + Scikit-Learn
                </div>

            </div>
        </div>
    </div>
</div>

<script>
document.getElementById("scrapeForm").addEventListener("submit", function() {
    const btn = document.getElementById("extractBtn");
    const text = document.getElementById("btnText");
    text.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Processing...';
    btn.disabled = true;
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
